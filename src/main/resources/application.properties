spring.application.name=backend

gh.url=http://host.docker.internal:8989


spring.datasource.url=jdbc:postgresql://host.docker.internal:5433/walk
spring.datasource.username=walk
spring.datasource.password=walk
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
